<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Qualium AI Portal</title>
    <meta name="description" content="Sign in to Qualium AI Employee Portal">
    <link rel="icon" type="image/png" href="../assets/logo-white.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner spinner-lg"></div>
        <div class="loading-text">Loading...</div>
    </div>

    <div class="auth-page" id="authPage" style="display:none">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <img src="../assets/logo-white.png" alt="Qualium AI" height="32">
                    <span class="auth-logo-text">Qualium AI</span>
                </div>

                <!-- Login Form -->
                <div id="loginView">
                    <h1 class="auth-title">Welcome back</h1>
                    <p class="auth-subtitle">Sign in to your employee portal</p>

                    <form id="loginForm" novalidate>
                        <div class="form-group">
                            <label class="form-label" for="loginEmail">Email Address</label>
                            <input type="email" class="form-input" id="loginEmail" placeholder="you@qualiumai.in" required autocomplete="email">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="loginPassword">Password</label>
                            <div class="password-field">
                                <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
                                <button type="button" class="password-toggle" id="togglePassword" tabindex="-1">
                                    <span class="pw-icon">${Icons ? '' : ''}</span>
                                </button>
                            </div>
                        </div>

                        <div id="loginError" class="form-error-text" style="display:none; margin-bottom:16px"></div>

                        <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
                            <span id="loginBtnText">Sign In</span>
                            <div class="spinner spinner-sm" id="loginSpinner" style="display:none"></div>
                        </button>
                    </form>

                    <div class="auth-divider"><span>Need access?</span></div>
                    <p class="auth-footer">Contact your admin to receive an invitation link</p>
                </div>

                <!-- TOTP Verification Form -->
                <div id="totpView" style="display:none">
                    <h1 class="auth-title">Two-Factor Authentication</h1>
                    <p class="auth-subtitle">Enter the 6-digit code from your authenticator app</p>

                    <div class="otp-input-group" id="totpInputGroup">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="0" autofocus>
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="1">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="2">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="3">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="4">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="5">
                    </div>

                    <div id="totpError" class="form-error-text" style="display:none; text-align:center; margin-bottom:16px"></div>

                    <button class="btn btn-primary btn-full btn-lg" id="verifyTotpBtn">
                        <span id="totpBtnText">Verify Code</span>
                        <div class="spinner spinner-sm" id="totpSpinner" style="display:none"></div>
                    </button>

                    <div class="auth-footer" style="margin-top:20px">
                        <a href="#" id="backToLogin" style="color:var(--color-accent)">← Back to login</a>
                    </div>
                </div>
            </div>

            <div class="auth-footer" style="margin-top:24px; font-size:12px; color:var(--color-text-tertiary)">
                © 2026 Qualium AI, Inc. All rights reserved.
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <script src="../firebase-config.js"></script>
    <script src="../app.js"></script>
    <script src="app.js"></script>
</body>
</html>
