<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Account - Qualium AI Portal</title>
    <meta name="description" content="Complete your Qualium AI employee account setup">
    <link rel="icon" type="image/png" href="../assets/logo-white.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="wizard-container">
            <div class="auth-logo" style="margin-bottom:24px">
                <img src="../assets/logo-white.png" alt="Qualium AI" height="32">
                <span class="auth-logo-text">Qualium AI</span>
            </div>

            <div class="wizard-progress" id="wizardProgress"></div>

            <div class="wizard-card" id="wizardCard">
                <!-- Steps are rendered by JS -->
                <div class="spinner spinner-lg" style="margin:40px auto"></div>
                <p style="text-align:center;color:var(--color-text-secondary);font-size:14px;margin-top:16px">Loading your invitation...</p>
            </div>

            <div class="auth-footer" style="margin-top:24px; font-size:12px; color:var(--color-text-tertiary)">
                © 2026 Qualium AI, Inc. All rights reserved.
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <!-- QR Code library for TOTP -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="../firebase-config.js"></script>
    <script src="../app.js"></script>
    <script src="app.js"></script>
</body>
</html>
