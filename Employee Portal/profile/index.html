<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Qualium AI Portal</title>
    <meta name="description" content="Your Qualium AI profile">
    <link rel="icon" type="image/png" href="../assets/logo-white.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner spinner-lg"></div>
        <div class="loading-text">Loading profile...</div>
    </div>
    <div class="portal-layout" style="display:none" id="portalLayout">
        <aside class="portal-sidebar" id="sidebar"></aside>
        <div class="portal-main">
            <header class="portal-topbar" id="topbar"></header>
            <main class="portal-content" id="mainContent"></main>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <script src="../firebase-config.js"></script>
    <script src="../app.js"></script>
    <script src="app.js"></script>
</body>
</html>
