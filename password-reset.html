<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Qaulium AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #f5f7fb;
    --surface: #ffffff;
    --text: #0b0b0b;
    --muted: #6b7280;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --border: #e5e7eb;
    --error: #dc2626;
    --success: #16a34a;
    --font: 'IBM Plex Sans','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

[data-theme="dark"] {
    --bg: #0A0A0A;
    --surface: #141414;
    --text: #f5f5f5;
    --muted: #9ca3af;
    --accent: #60a5fa;
    --accent-hover: #3b82f6;
    --border: #262626;
    --error: #f87171;
    --success: #4ade80;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html {
    -webkit-font-smoothing: antialiased;
}

body {
    font-family: var(--font);
    color: var(--text);
    background: var(--bg);
    line-height: 1.6;
    min-height: 100vh;
}

.reset-container {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 100vh;
}

.reset-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 48px 32px;
}

.reset-logo {
    text-align: center;
    margin-bottom: 32px;
}

.reset-logo img {
    height: 40px;
    width: auto;
}

.reset-heading {
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.03em;
}

.reset-description {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 32px;
    line-height: 1.65;
}

.reset-status {
    padding: 16px;
    border-radius: 8px;
    margin-bottom: 24px;
    display: none;
}

.reset-status.show {
    display: block;
}

.reset-status.success {
    background: rgba(22, 163, 74, 0.1);
    color: var(--success);
    border: 1px solid var(--success);
}

.reset-status.error {
    background: rgba(220, 38, 38, 0.1);
    color: var(--error);
    border: 1px solid var(--error);
}

.reset-status.loading {
    background: rgba(37, 99, 235, 0.1);
    color: var(--accent);
    border: 1px solid var(--accent);
}

.reset-status p {
    margin: 0;
    font-size: 14px;
}

.reset-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-label {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--text);
}

.form-input {
    padding: 10px 14px;
    font-size: 15px;
    font-family: var(--font);
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    transition: border-color 0.2s;
    outline: none;
}

.form-input:focus {
    border-color: var(--accent);
}

.form-input:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.form-hint {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
}

.form-actions {
    display: flex;
    gap: 12px;
    margin-top: 8px;
}

.btn {
    flex: 1;
    padding: 10px 16px;
    font-size: 15px;
    font-weight: 600;
    font-family: var(--font);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
    outline: none;
}

.btn-primary {
    background: var(--accent);
    color: #fff;
}

.btn-primary:hover {
    background: var(--accent-hover);
}

.btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
}

.btn-secondary:hover {
    color: var(--text);
    background: rgba(0,0,0,.04);
}

.theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 50;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s, border-color .2s;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
}

.theme-toggle:hover {
    border-color: var(--accent);
}

.theme-toggle .icon-sun {
    display: block;
}

.theme-toggle .icon-moon {
    display: none;
}

[data-theme="dark"] .theme-toggle .icon-sun {
    display: none;
}

[data-theme="dark"] .theme-toggle .icon-moon {
    display: block;
}

.success-message {
    text-align: center;
    padding: 40px 0;
}

.success-check {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--success);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
}

.success-check svg {
    width: 32px;
    height: 32px;
    stroke: #fff;
    fill: none;
    stroke-width: 3;
}

.success-message h2 {
    font-family: 'Inter', sans-serif;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
}

.success-message p {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 24px;
}

.success-message a {
    color: var(--accent);
    font-weight: 500;
    text-decoration: none;
}

.loading-spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
  <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
  <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
</button>

<div class="reset-container">
    <div id="resetCard" class="reset-card">
        <div class="reset-logo">
            <img src="logo-white.png" alt="Qaulium AI">
        </div>

        <h1 class="reset-heading">Reset Password</h1>
        <p class="reset-description">Enter your new password below.</p>

        <div id="statusMessage" class="reset-status"></div>

        <form id="resetForm" class="reset-form">
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" id="newPassword" class="form-input" placeholder="At least 8 characters" required>
                <p class="form-hint">Must be at least 8 characters long</p>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm your password" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="submitBtn">Reset Password</button>
            </div>
        </form>

        <p style="margin-top: 24px; text-align: center; font-size: 14px; color: var(--muted);">
            Remember your password? <a href="/" style="color: var(--accent); text-decoration: none; font-weight: 500;">Back to login</a>
        </p>
    </div>
</div>

<script>
(function() {
    'use strict';

    // Theme management (sync with landing page)
    const savedTheme = localStorage.getItem('qaulium-theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);

    document.getElementById('themeToggle').addEventListener('click', function() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('qaulium-theme', next);
    });

    // Get token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    const statusEl = document.getElementById('statusMessage');
    const form = document.getElementById('resetForm');
    const submitBtn = document.getElementById('submitBtn');
    const newPasswordEl = document.getElementById('newPassword');
    const confirmPasswordEl = document.getElementById('confirmPassword');

    // Verify token on page load
    if (!token) {
        showStatus('Invalid password reset link. Please request a new one.', 'error');
        form.style.display = 'none';
        return;
    }

    verifyToken();

    // Token verification
    async function verifyToken() {
        try {
            const response = await fetch('/api/password-reset/verify-token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });

            const data = await response.json();

            if (!data.success) {
                showStatus('This password reset link has expired. Please request a new one.', 'error');
                form.style.display = 'none';
            }
        } catch (err) {
            showStatus('Failed to verify reset token: ' + err.message, 'error');
            form.style.display = 'none';
        }
    }

    // Form submission
    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const newPassword = newPasswordEl.value.trim();
        const confirmPassword = confirmPasswordEl.value.trim();

        if (!newPassword) {
            showStatus('Password is required.', 'error');
            return;
        }

        if (newPassword.length < 8) {
            showStatus('Password must be at least 8 characters long.', 'error');
            return;
        }

        if (newPassword !== confirmPassword) {
            showStatus('Passwords do not match.', 'error');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Resetting password...';

        try {
            const response = await fetch('/api/password-reset/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });

            const data = await response.json();

            if (data.success) {
                showStatus('Password reset successfully! Redirecting...', 'success');
                form.style.display = 'none';
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            } else {
                showStatus(data.message || 'Failed to reset password.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        } catch (err) {
            showStatus('Error: ' + err.message, 'error');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Reset Password';
        }
    });

    function showStatus(message, type) {
        statusEl.textContent = message;
        statusEl.className = `reset-status show ${type}`;
    }
})();
</script>

</body>
</html>
